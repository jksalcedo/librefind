name: Release APK
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  #Full history 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > release-keystore.jks

      - name: Build and Sign release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks  # env vars, not -P flags
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --configuration-cache \
            -Dorg.gradle.workers.max=4

      - name: Verify APK is signed  # catches signing failures early
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | grep -v unsigned | head -1)
          if [ -z "$APK" ]; then
            echo "No signed APK found — check signingConfig in build.gradle"
            exit 1
          fi
          echo "Signed APK: $APK"

      - name: Clean up keystore
        if: always()
        run: rm -f release-keystore.jks

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          draft: false
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
