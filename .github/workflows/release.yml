name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # Updated to latest or a version that supports Node 24 if available
        uses: actions/checkout@v4 

      - name: Set up JDK 17
        # Updated to latest or a version that supports Node 24 if available
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        # Updated to latest or a version that supports Node 24 if available
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > release-keystore.jks

      - name: Build and Sign release APK
        # Use Gradle to build AND sign. This requires configuring signing in your app/build.gradle
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release-keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --build-cache \
            --parallel \
            --configuration-cache \
            -Dorg.gradle.workers.max=4

      - name: Clean up keystore
        if: always()
        run: rm -f release-keystore.jks

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # Updated to a version that supports Node 24 if available
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          generate_release_notes: true 
          draft: false
          # Find the signed APK generated by Gradle
          files: app/build/outputs/apk/release/*.apk 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
