name: Release APK
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  #Full history 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > release-keystore.jks

      - name: Verify env vars are set
        run: |
          echo "KEYSTORE_PATH=$KEYSTORE_PATH"
          [ -f "$KEYSTORE_PATH" ] && echo "✅ Keystore file exists" || echo "❌ Keystore file NOT found"
          [ -n "$KEYSTORE_PASSWORD" ] && echo "✅ KEYSTORE_PASSWORD set" || echo "❌ KEYSTORE_PASSWORD missing"
          [ -n "$KEY_ALIAS" ] && echo "✅ KEY_ALIAS set" || echo "❌ KEY_ALIAS missing"
          [ -n "$KEY_PASSWORD" ] && echo "✅ KEY_PASSWORD set" || echo "❌ KEY_PASSWORD missing"
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build and Sign release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks  # env vars, not -P flags
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --configuration-cache \
            -Dorg.gradle.workers.max=4

      - name: Verify APK is signed  # catches signing failures early
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | grep -v unsigned | head -1)
          if [ -z "$APK" ]; then
            echo "No signed APK found — check signingConfig in build.gradle"
            exit 1
          fi
          echo "Signed APK: $APK"

      - name: Clean up keystore
        if: always()
        run: rm -f release-keystore.jks

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"beta"* || "$TAG" == *"alpha"* || "$TAG" == *"rc"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release asset
        run: |
          cp app/build/outputs/apk/release/app-release.apk "librefind-${{ steps.version.outputs.tag }}-release.apk"

      - name: Generate categorized release notes
        run: |
          set -euo pipefail
          git fetch --tags --force
          
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1 || true)"
          
          # Determine the commit range
          if [[ -n "${PREV_TAG}" ]]; then
            RANGE="${PREV_TAG}..${TAG}"
            echo "Changes since ${PREV_TAG}" >> RELEASE_NOTES.md
          else
            RANGE="${TAG}"
            echo "Initial Release" >> RELEASE_NOTES.md
          fi
          echo "" >> RELEASE_NOTES.md
          
          # 1. Dump all non-merge commits to a temp file
          # We check for standard prefixes: feat, fix, chore, docs, refactor, etc.
          git log "${RANGE}" --no-merges --pretty=format:"- %s (%h)" > all_commits.txt
          
          # 2. Extract Features (looks for 'feat' or 'feat(' case-insensitive)
          echo "### Features" >> RELEASE_NOTES.md
          grep -iE "^- feat" all_commits.txt >> RELEASE_NOTES.md || echo "_No new features._" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          # 3. Extract Bug Fixes (looks for 'fix' or 'fix(')
          echo "### Bug Fixes" >> RELEASE_NOTES.md
          grep -iE "^- fix" all_commits.txt >> RELEASE_NOTES.md || echo "_No bug fixes._" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          # 4. Extract Others (Everything that is NOT feat or fix)
          echo "### Other Changes" >> RELEASE_NOTES.md
          grep -ivE "^- (feat|fix)" all_commits.txt >> RELEASE_NOTES.md || echo "_No other changes._" >> RELEASE_NOTES.md
          
          # Cleanup
          rm all_commits.txt
          
          # Debug print to console
          cat RELEASE_NOTES.md

      - name: Create GitHub Release and upload APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          PRERELEASE=false
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            PRERELEASE=true
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release exists: $TAG"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file RELEASE_NOTES.md \
              $( [[ "$PRERELEASE" == "true" ]] && echo "--prerelease" )
          fi

          gh release upload "$TAG" "librefind-${TAG}-release.apk" --clobber
